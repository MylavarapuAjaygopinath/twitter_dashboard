<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twitter Analytics Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b,#334155);
    color:white;
    text-align:center;
    padding:40px;
}

.container{
    max-width:1200px;
    margin:auto;
    animation: fadeIn 1.5s ease-in-out;
}

h1{
    font-size:42px;
    margin-bottom:10px;
    color:#38bdf8;
}

p{
    font-size:18px;
    color:#cbd5e1;
    margin-bottom:30px;
}

.dashboard-box{
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 25px rgba(0,0,0,0.4);
    transition:0.4s;
}

.dashboard-box:hover{
    transform:scale(1.02);
}

.dashboard-box img{
    width:100%;
    border-radius:15px;
}

.btn{
    display:inline-block;
    margin-top:25px;
    padding:14px 28px;
    background:#38bdf8;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-size:18px;
    transition:0.3s;
}

.btn:hover{
    background:#0ea5e9;
    transform:translateY(-3px);
}

.footer{
    margin-top:30px;
    color:#94a3b8;
    font-size:14px;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">

<h1>📊 Twitter Analytics Dashboard</h1>
<p>Developed using Power BI | Hosted on Render</p>

<div class="dashboard-box">
    <img src="dashboard.png" alt="Dashboard Screenshot">
</div>

<a href="dashboard.png" class="btn" target="_blank">🔍 View Full Dashboard</a>

<div class="footer">
    © 2026 Data Analytics Project
</div>

</div>

</body>
</html>
